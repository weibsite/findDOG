<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋寵地圖</title>
    <!--不請求icon-->
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon"> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2d3748; font-family: 'Courier New', Courier, monospace; }
        #map-container { position: relative; width: 100vw; height: 100vh; }
        #map { width: 100%; height: 100%; background-color: #1a202c; }
        
        .pixel-panel { background-color: white; border: 4px solid #1a202c; box-shadow: 6px 6px 0px #1a202c; border-radius: 0px !important; }
        .pixel-btn { background-color: #f59e0b; color: white; border: 4px solid #b45309; box-shadow: inset -4px -4px 0px rgba(0,0,0,0.2), 4px 4px 0px #1a202c; font-weight: bold; text-transform: uppercase; transition: all 0.1s; }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2), 0px 0px 0px #1a202c; }
        .pixel-btn-blue { background-color: #3b82f6; border-color: #1d4ed8; }
        .pixel-btn-red { background-color: #ef4444; border-color: #b91c1c; }
        .pixel-btn-green { background-color: #10b981; border-color: #047857; }
        .pixel-btn-purple { background-color: #8b5cf6; border-color: #6d28d9; }
        
        .hud-text { text-shadow: 2px 2px 0px #1a202c, -1px -1px 0px #1a202c, 1px -1px 0px #1a202c, -1px 1px 0px #1a202c; color: white; font-weight: 900; }
        .pixel-border { border: 4px solid #1a202c; box-shadow: 4px 4px 0px #1a202c; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; pointer-events: none; z-index: 1000; }
        .crosshair-line { position: absolute; background-color: #ef4444; border: 2px solid #1a202c; }
        
        .custom-marker { background: none; border: none; }
        .marker-icon { width: 32px; height: 32px; filter: drop-shadow(2px 2px 0px #1a202c); }
        .route-path { filter: drop-shadow(2px 2px 0px #1a202c); }

        .fog-of-war {
            pointer-events: none;
            z-index: 400;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a202c; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loading-pixel {
            width: 40px; height: 40px; background-color: #f59e0b;
            border: 4px solid white; box-shadow: 4px 4px 0px #1a202c;
            animation: spin 1s step-end infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 25% { transform: rotate(90deg); } 50% { transform: rotate(180deg); } 75% { transform: rotate(270deg); } 100% { transform: rotate(360deg); } }

        .marquee-container {
            position: relative; width: 100%; overflow: hidden; background: #fffbeb;
            border-bottom: 2px solid #fcd34d; padding: 4px 0;
        }
        .marquee-content {
            display: flex; white-space: nowrap; animation: marquee-scroll 15s linear infinite;
        }
        @keyframes marquee-scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-short {
            animation: bounce-short 1s ease-in-out 3;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="loading-pixel mb-4"></div>
        <div class="text-white font-bold text-xl hud-text">連線中...</div>
        <div id="loading-error" class="hidden text-red-500 font-bold mt-4 text-center px-4 bg-white/90 p-2 border-4 border-red-700 max-w-sm rounded"></div>
    </div>

    <!-- 慶祝阿妹找到 Modal -->
    <div id="amei-celebration" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/60 hidden">
        <div class="bg-white p-6 rounded-2xl shadow-2xl text-center max-w-sm mx-4 border-4 border-yellow-400 relative overflow-hidden animate-bounce-short">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-300 via-yellow-500 to-yellow-300"></div>
            <h2 class="text-2xl font-black text-red-600 mb-4 tracking-wider">🎉 慶祝找到阿妹 🎉</h2>
            <p class="text-xl text-gray-800 font-bold leading-relaxed mb-6">
                大家辛苦了！<br>請到抽獎區域領取飲料謝謝！
            </p>
            <div class="text-sm text-gray-600 mb-6 bg-yellow-50 p-3 rounded-lg border border-yellow-200 text-left">
                📍 <b>活動加碼：</b><br>
                在「找阿妹」地標 10 公里內、步數達 3000 步且未中獎的玩家，享有<b>無限次免費抽獎</b>直到中獎為止！
            </div>
            <button onclick="document.getElementById('amei-celebration').classList.add('hidden')" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-all active:scale-95 shadow-md">
                我知道了！去抽獎 🎁
            </button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        
        <div id="crosshair">
            <div class="crosshair-line" style="top: 0; left: 18px; width: 4px; height: 12px;"></div>
            <div class="crosshair-line" style="bottom: 0; left: 18px; width: 4px; height: 12px;"></div>
            <div class="crosshair-line" style="left: 0; top: 18px; width: 12px; height: 4px;"></div>
            <div class="crosshair-line" style="right: 0; top: 18px; width: 12px; height: 4px;"></div>
        </div>

        <div class="absolute top-4 left-4 z-[1000] pointer-events-none">
            <div class="hud-text text-3xl mb-1 text-yellow-400">Lv.<span id="user-level">1</span></div>
            <div class="hud-text text-lg">步數: <span id="step-count">0</span></div>
            <div class="hud-text text-lg text-blue-300 mt-1">
                座標: <span id="coord-display">尋找定位中...</span>
            </div>
        </div>

        <!-- 中獎跑馬燈 -->
        <div class="absolute top-20 left-0 w-full z-[1000] pointer-events-none hidden" id="winner-marquee">
            <div class="marquee-container shadow-md">
                <div class="marquee-content text-sm font-bold text-red-600 tracking-wide" id="marquee-text">
                    <!-- 動態載入 -->
                </div>
            </div>
        </div>

        <div class="absolute top-4 right-4 z-[1000] pointer-events-none text-right">
            <div class="hud-text text-xl mb-1">玩家: <span id="online-count">1</span></div>
            <div class="hud-text text-lg text-green-400" id="network-status">● 連線中</div>
        </div>

        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-[1000] flex gap-3">
            <button id="add-btn" class="pixel-btn px-6 py-3 text-lg hidden">＋標記</button>
            <button id="center-btn" class="pixel-btn pixel-btn-blue px-6 py-3 text-lg hidden">📍置中</button>
            <button id="eva-grid-btn" class="pixel-btn pixel-btn-purple px-6 py-3 text-lg hidden">EVA</button>
            <button id="my-route-btn" class="pixel-btn pixel-btn-green px-6 py-3 text-lg hidden">我的軌跡</button>
        </div>

        <!-- 懸浮禮物按鈕 -->
        <div id="floating-gift-container" class="absolute bottom-24 right-4 z-[1000] hidden">
            <button id="floating-gift-btn" class="relative group">
                <div class="absolute -top-3 -right-3 bg-red-500 text-white font-bold rounded-full w-7 h-7 flex items-center justify-center border-2 border-white shadow-md z-10 animate-pulse text-xs" id="ticket-badge">
                    0
                </div>
                <div class="bg-yellow-400 border-4 border-yellow-600 rounded-xl p-3 shadow-lg transform transition-transform group-hover:scale-110 group-active:scale-95 animate-bounce">
                    <svg class="w-10 h-10 text-red-600 drop-shadow-md" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-6-2v2h-4V5h4zM4 9h16v3H4V9zm0 5h16v5H4v-5z"/>
                        <path d="M12 9v11" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </div>
            </button>
        </div>

        <!-- 禮物盒 Modal -->
        <div id="gift-modal" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/70 hidden backdrop-blur-sm">
            <div class="bg-[#2d3748] p-4 rounded-xl shadow-2xl border-4 border-[#4a5568] w-11/12 max-w-lg max-h-[90vh] flex flex-col relative">
                <!-- 裝飾邊框 -->
                <div class="absolute inset-0 border-2 border-[#1a202c] rounded-lg m-1 pointer-events-none"></div>
                
                <!-- 標題區 -->
                <div class="text-center mb-4 relative z-10 border-b-4 border-[#4a5568] pb-3">
                    <h2 class="text-3xl font-black text-yellow-400 drop-shadow-[2px_2px_0_#000] tracking-widest mb-2 flex items-center justify-center gap-2">
                        <span class="text-4xl">🎁</span> 戰備補給箱
                    </h2>
                    
                    <div class="flex justify-between items-center bg-[#1a202c] rounded-lg p-3 border-2 border-[#4a5568] shadow-inner mt-2">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl drop-shadow-md">🎟️</span>
                            <div class="text-left">
                                <div class="text-xs text-gray-400 font-bold">可用抽獎券</div>
                                <div class="text-xl font-black text-white" id="modal-ticket-count">0</div>
                            </div>
                        </div>
                        <div class="h-10 w-1 bg-[#4a5568] rounded-full mx-2"></div>
                        <div class="flex items-center gap-2">
                            <span class="text-2xl drop-shadow-md">👣</span>
                            <div class="text-left">
                                <div class="text-xs text-gray-400 font-bold">累積步數</div>
                                <div class="text-xl font-black text-white" id="modal-step-count">0</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 內容區 (可滾動) -->
                <div class="flex-1 overflow-y-auto px-1 scrollbar-hide relative z-10" id="gift-content-area">
                    <!-- 抽獎主畫面 -->
                    <div id="draw-section" class="flex flex-col items-center justify-center h-full min-h-[250px] py-4">
                        <div class="relative w-40 h-40 mb-6 mx-auto group perspective-1000">
                            <!-- 獎品圖片 (結果) -->
                            <img id="gift-image" src="" alt="Prize" class="w-full h-full object-contain drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] hidden rounded-lg border-4 border-yellow-400 bg-white/10 p-2 transform transition-transform duration-500 group-hover:scale-105">
                            
                            <!-- 預設寶箱圖示 -->
                            <div id="gift-box-icon" class="w-full h-full flex items-center justify-center bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl border-4 border-yellow-700 shadow-[inset_0_-8px_0_rgba(0,0,0,0.2),_0_10px_20px_rgba(0,0,0,0.5)] cursor-pointer transform transition-all duration-300 hover:rotate-3 hover:-translate-y-2 active:translate-y-1">
                                <svg class="w-24 h-24 text-yellow-100 drop-shadow-lg" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M20 7h-4V5c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-6-2v2h-4V5h4zM4 9h16v3H4V9zm0 5h16v5H4v-5z"/>
                                    <path d="M12 9v11" stroke="#b45309" stroke-width="2"/>
                                </svg>
                                <!-- 鎖孔 -->
                                <div class="absolute bottom-6 w-4 h-6 bg-yellow-900 rounded-full flex flex-col items-center justify-start pt-1">
                                    <div class="w-2 h-2 bg-black rounded-full"></div>
                                    <div class="w-1 h-2 bg-black mt-0.5"></div>
                                </div>
                            </div>

                            <!-- 抽獎特效 -->
                            <div id="draw-effect" class="absolute inset-0 hidden items-center justify-center pointer-events-none">
                                <div class="w-32 h-32 border-8 border-yellow-400 rounded-full animate-spin border-t-transparent shadow-[0_0_20px_#facc15]"></div>
                                <div class="absolute inset-0 bg-yellow-300/30 rounded-full animate-ping"></div>
                            </div>
                        </div>
                        
                        <div id="gift-name" class="text-xl font-bold text-white text-center mb-2 min-h-[32px] drop-shadow-md px-4 py-1 rounded bg-black/30 w-full hidden"></div>
                        <div id="draw-result" class="text-yellow-400 font-black text-2xl text-center mb-6 min-h-[36px] drop-shadow-[1px_1px_0_#000] hidden"></div>
                        
                        <button id="draw-btn" class="w-full bg-gradient-to-b from-yellow-400 to-yellow-600 hover:from-yellow-300 hover:to-yellow-500 text-yellow-900 border-4 border-yellow-700 font-black py-4 rounded-xl shadow-[0_6px_0_#854d0e] active:shadow-none active:translate-y-[6px] transition-all text-xl uppercase tracking-widest flex items-center justify-center gap-2">
                            <span>抽取物資</span>
                            <span class="text-sm bg-yellow-900 text-yellow-100 px-2 py-0.5 rounded shadow-inner">-1 🎟️</span>
                        </button>
                    </div>

                    <!-- 獎品清單與機率畫面 (預設隱藏) -->
                    <div id="prize-list-section" class="hidden py-2">
                        <h3 class="text-white font-bold border-l-4 border-blue-500 pl-2 mb-3 text-lg bg-[#1a202c] p-2 rounded flex items-center justify-between">
                            <span>🔍 獎品總覽</span>
                            <span class="text-xs text-gray-400 font-normal">首抽機率 / 一般機率</span>
                        </h3>
                        <div id="prizes-grid" class="grid grid-cols-2 gap-3 mb-6">
                            <!-- JS 動態載入獎品清單 -->
                            <div class="col-span-2 text-center text-gray-500 py-4">載入中...</div>
                        </div>

                        <h3 class="text-white font-bold border-l-4 border-green-500 pl-2 mb-3 text-lg bg-[#1a202c] p-2 rounded">🏆 最近中獎名單</h3>
                        <div class="bg-[#1a202c] border-2 border-[#4a5568] rounded-lg p-2 max-h-40 overflow-y-auto" id="recent-winners-list">
                            <!-- JS 動態載入中獎名單 -->
                            <div class="text-center text-gray-500 py-2 text-sm">尚無紀錄</div>
                        </div>
                    </div>

                    <!-- 我的獎品畫面 (預設隱藏) -->
                    <div id="my-prizes-section" class="hidden py-2">
                        <h3 class="text-white font-bold border-l-4 border-purple-500 pl-2 mb-3 text-lg bg-[#1a202c] p-2 rounded">🎒 我的背包</h3>
                        <div id="my-prizes-grid" class="grid grid-cols-2 gap-3">
                            <!-- JS 動態載入我的獎品 -->
                            <div class="col-span-2 text-center text-gray-500 py-8 font-bold">載入中...</div>
                        </div>
                    </div>
                </div>

                <!-- 底部導覽列 -->
                <div class="mt-4 pt-3 border-t-4 border-[#4a5568] flex justify-between gap-2 relative z-10">
                    <button id="nav-draw-btn" class="flex-1 bg-[#4a5568] text-white py-2 rounded-lg font-bold border-2 border-transparent focus:border-yellow-400 hover:bg-[#2d3748] transition-colors text-sm">
                        🎰 抽獎
                    </button>
                    <button id="nav-list-btn" class="flex-1 bg-[#4a5568] text-white py-2 rounded-lg font-bold border-2 border-transparent focus:border-yellow-400 hover:bg-[#2d3748] transition-colors text-sm">
                        📋 獎池
                    </button>
                    <button id="nav-my-btn" class="flex-1 bg-[#4a5568] text-white py-2 rounded-lg font-bold border-2 border-transparent focus:border-yellow-400 hover:bg-[#2d3748] transition-colors text-sm">
                        🎒 我的
                    </button>
                </div>

                <!-- 關閉按鈕 -->
                <button id="close-gift-modal-btn" class="absolute -top-4 -right-4 bg-red-600 text-white w-10 h-10 rounded-full border-4 border-white shadow-lg font-black text-xl hover:bg-red-700 active:scale-95 transition-transform flex items-center justify-center z-50">
                    ×
                </button>
            </div>
        </div>

        <!-- 歷史軌跡管理 Modal -->
        <div id="history-modal" class="pixel-panel absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[2000] p-6 hidden w-11/12 max-w-sm">
            <h2 class="text-xl font-bold mb-4 text-center">我的探索軌跡</h2>
            <div class="text-sm mb-4 text-gray-700">
                <p>目前記錄點數：<span id="history-point-count" class="font-bold">0</span> 點</p>
                <p class="mt-1 text-xs text-gray-500">（系統上限 5000 點）</p>
            </div>
            
            <div class="flex flex-col gap-3">
                <button id="toggle-history-btn" class="pixel-btn pixel-btn-blue py-3 font-bold w-full">顯示我的軌跡</button>
                
                <div class="border-t-2 border-dashed border-gray-300 my-2"></div>
                
                <div class="text-xs text-red-600 font-bold text-center mb-1">危險操作區</div>
                <button id="clear-history-btn" class="pixel-btn pixel-btn-red py-3 font-bold w-full bg-red-100 text-red-700 border-red-500">清除所有軌跡</button>
            </div>
            
            <button onclick="document.getElementById('history-modal').classList.add('hidden')" class="mt-6 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded w-full border-2 border-gray-500">關閉</button>
        </div>

        <div id="announcement" class="absolute top-20 left-1/2 transform -translate-x-1/2 z-[1000] bg-black bg-opacity-70 text-white p-3 rounded-lg border-2 border-yellow-500 w-11/12 max-w-md hidden text-center">
            <p id="announcement-text" class="text-sm"></p>
        </div>
        
        <div id="add-modal" class="pixel-panel absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[2000] p-6 hidden w-11/12 max-w-sm">
            <h2 class="text-xl font-bold mb-4">新增標記</h2>
            <select id="marker-type" class="w-full mb-4 p-2 border-2 border-gray-400 rounded">
                <option value="尋找">📍 尋找</option>
                <option value="發現">👀 發現</option>
                <option value="可疑">❓ 可疑</option>
            </select>
            <textarea id="marker-desc" class="w-full mb-4 p-2 border-2 border-gray-400 rounded h-24" placeholder="輸入描述..."></textarea>
            <div class="flex justify-end gap-2">
                <button id="cancel-btn" class="bg-gray-300 px-4 py-2 font-bold border-2 border-gray-500">取消</button>
                <button id="submit-btn" class="pixel-btn pixel-btn-green px-4 py-2">確定</button>
            </div>
        </div>

        <!-- 自訂提示 Modal -->
        <div id="alert-modal" class="fixed inset-0 z-[10000] flex items-center justify-center bg-black/50 hidden backdrop-blur-sm">
            <div class="bg-white p-6 rounded-xl shadow-2xl text-center max-w-xs mx-4 border-2 border-gray-200">
                <p id="alert-message" class="text-lg text-gray-800 font-bold mb-6 whitespace-pre-line leading-relaxed"></p>
                <button onclick="document.getElementById('alert-modal').classList.add('hidden')" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-8 rounded-lg transition-colors w-full">
                    確定
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function showModal(msg) {
            document.getElementById('alert-message').innerText = msg;
            document.getElementById('alert-modal').classList.remove('hidden');
        }

        const map = L.map('map', { zoomControl: false }).setView([25.0330, 121.5654], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        const markersLayer = L.layerGroup().addTo(map);
        const userMarkersLayer = L.layerGroup().addTo(map);
        const pathsLayer = L.layerGroup().addTo(map);
        const evaGridLayer = L.layerGroup().addTo(map);

        const wsUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'ws://127.0.0.1:8000/ws' 
            : `wss://${window.location.hostname}/ws`;
        
        let ws;
        let dbState = {
            locations: {},
            sightings: {},
            routes: {},
            announcements: { current: "歡迎來到尋寵地圖！" }
        };
        let userState = { uid: localStorage.getItem('uid'), lat: null, lng: null, history: [], userName: "", steps: 0, tickets: 0, usedTickets: 0 };
        let hasWonPrize = false; // 新增：追蹤是否中過獎
        
        let updateInterval;
        let isLocating = false;
        let mapMoving = false;
        let isAddingMarker = false;
        let isShowingMyRoute = false;
        let isShowingEvaGrid = false;
        let currentMyRoutePath = null;
        let myLocationMarker = null;

        const ICONS = {
            '尋找': 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ef4444"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',

        // ================= 迷霧系統 (Fog of War) =================
        let fogCanvas = null;
        let fogCtx = null;
        let fogLayer = null;

        function initFogOfWar() {
            fogCanvas = document.createElement('canvas');
            fogCtx = fogCanvas.getContext('2d');
            
            L.Layer.FogLayer = L.Layer.extend({
                onAdd: function(map) {
                    this._map = map;
                    this._el = L.DomUtil.create('div', 'leaflet-zoom-animated fog-of-war');
                    this._el.appendChild(fogCanvas);
                    map.getPanes().overlayPane.appendChild(this._el);
                    map.on('viewreset moveend', this._update, this);
                    this._update();
                },
                onRemove: function(map) {
                    map.getPanes().overlayPane.removeChild(this._el);
                    map.off('viewreset moveend', this._update, this);
                },
                _update: function() {
                    if (!this._map) return;
                    let bounds = this._map.getBounds();
                    let size = this._map.getSize();
                    let topLeft = this._map.latLngToLayerPoint(bounds.getNorthWest());
                    
                    L.DomUtil.setPosition(this._el, topLeft);
                    fogCanvas.width = size.x;
                    fogCanvas.height = size.y;
                    
                    renderFog();
                }
            });
            fogLayer = new L.Layer.FogLayer();
            map.addLayer(fogLayer);
        }

        function renderFog() {
            if (!fogCtx || !map) return;
            const size = map.getSize();
            const bounds = map.getBounds();
            
            fogCtx.clearRect(0, 0, size.x, size.y);
            fogCtx.fillStyle = 'rgba(0, 0, 0, 0.9)';
            fogCtx.fillRect(0, 0, size.x, size.y);

            fogCtx.globalCompositeOperation = 'destination-out';
            
            let viewExpandedBounds = bounds.pad(0.5);

            for (const uid in dbState.locations) {
                const data = dbState.locations[uid];
                if (data.history && data.history.length > 0) {
                    let isSelf = (uid === userState.uid);
                    let radius = isSelf ? 200 : 150; // 米

                    data.history.forEach(pt => {
                        let ptLatLng = L.latLng(pt.lat, pt.lng);
                        if (viewExpandedBounds.contains(ptLatLng)) {
                            let p = map.latLngToContainerPoint(ptLatLng);
                            let pxRadius = radius / Math.cos(ptLatLng.lat * Math.PI / 180) / map.project([0,0], map.getZoom()).distanceTo(map.project([0,1], map.getZoom()));
                            pxRadius = Math.max(20, Math.min(pxRadius, 300));
                            
                            let timeDiff = Date.now() - (pt.timestamp || 0);
                            let alpha = 1.0;
                            if (timeDiff > 3600000) {
                                alpha = 0.6; // 1小時後迷霧恢復為0.4透明度 (1.0 - 0.6 = 0.4)
                            }

                            if (alpha > 0) {
                                let grad = fogCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pxRadius);
                                grad.addColorStop(0, `rgba(0,0,0,${alpha})`);
                                grad.addColorStop(0.5, `rgba(0,0,0,${alpha * 0.8})`);
                                grad.addColorStop(1, 'rgba(0,0,0,0)');
                                
                                fogCtx.beginPath();
                                fogCtx.arc(p.x, p.y, pxRadius, 0, Math.PI * 2);
                                fogCtx.fillStyle = grad;
                                fogCtx.fill();
                            }
                        }
                    });
                }
            }
            fogCtx.globalCompositeOperation = 'source-over';
        }
        // =========================================================

        function optimizeHistory(history) {
            if (history.length <= 1) return history;
            
            let optimized = [history[0]];
            for (let i = 1; i < history.length - 1; i++) {
                let prev = optimized[optimized.length - 1];
                let curr = history[i];
                let dist = map.distance([prev.lat, prev.lng], [curr.lat, curr.lng]);
                
                if (dist > CLEANUP_DISTANCE_METERS) {
                    optimized.push(curr);
                }
            }
            optimized.push(history[history.length - 1]);
            
            if (optimized.length > MAX_HISTORY_POINTS) {
                optimized = optimized.slice(optimized.length - MAX_HISTORY_POINTS);
            }
            return optimized;
        }

        function calculateSteps() {
            let dist = 0;
            if (userState.history.length > 1) {
                for (let i = 1; i < userState.history.length; i++) {
                    let d = map.distance([userState.history[i-1].lat, userState.history[i-1].lng], [userState.history[i].lat, userState.history[i].lng]);
                    if (d < 1000) dist += d; // 忽略大於1km的跳躍
                }
            }
            userState.steps = Math.floor(dist / 0.6); // 假設步幅0.6米
        }

        function updateTicketsUI() {
            let newTickets = Math.floor(userState.steps / 100) - userState.usedTickets;
            if (newTickets < 0) newTickets = 0;

            badge.innerText = userState.tickets;

            } else {
                badge.classList.add('hidden');
            }
            
            document.getElementById('modal-ticket-count').innerText = userState.tickets;
            document.getElementById('modal-step-count').innerText = userState.steps;
        }

            function switchTab(activeBtn, showSection) {
                [navDrawBtn, navListBtn, navMyBtn].forEach(btn => {
                    btn.classList.remove('bg-[#2d3748]', 'border-yellow-400');
                    btn.classList.add('border-transparent');
                });
                activeBtn.classList.add('bg-[#2d3748]', 'border-yellow-400');
                activeBtn.classList.remove('border-transparent');
                
                [drawSection, listSection, mySection].forEach(sec => sec.classList.add('hidden'));
                showSection.classList.remove('hidden');
            }

            navDrawBtn.onclick = () => switchTab(navDrawBtn, drawSection);
            
            navListBtn.onclick = () => {
                switchTab(navListBtn, listSection);
                ws.send(JSON.stringify({ type: 'get_prizes' }));
            };
            
            navMyBtn.onclick = () => {
                switchTab(navMyBtn, mySection);
                ws.send(JSON.stringify({ type: 'get_my_prizes', uid: userState.uid }));
            };

            let isDrawing = false;
            const drawBtn = document.getElementById('draw-btn');
            
            drawBtn.onclick = () => {
                if (isDrawing) return;
                
                // --- 阿妹活動資格判定 ---
                let eligibleForAmei = false;
                let ameiSighting = Object.values(dbState.sightings).find(s => (s.description && s.description.includes("阿妹")) || (s.title && s.title.includes("阿妹")));
                
                if (ameiSighting && userState.lat && userState.lng) {
                    const R = 6371e3;
                    const lat1 = userState.lat * Math.PI/180;
                    const lat2 = parseFloat(ameiSighting.lat) * Math.PI/180;
                    const deltaLat = (parseFloat(ameiSighting.lat) - userState.lat) * Math.PI/180;
                    const deltaLng = (parseFloat(ameiSighting.lng) - userState.lng) * Math.PI/180;
                    const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) +
                            Math.cos(lat1) * Math.cos(lat2) *
                            Math.sin(deltaLng/2) * Math.sin(deltaLng/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    const dist = R * c;

                    // 條件：距離 <= 10 公里 (10000公尺)，步數 >= 3000，且未曾中獎
                    if (dist <= 10000 && userState.steps >= 3000 && !hasWonPrize) {
                        eligibleForAmei = true;
                    }
                }

                if (eligibleForAmei) {
                    // 免費抽獎！不扣除抽獎券
                    console.log("🎉 觸發阿妹活動：無限免費抽獎！");
                } else {
                    if (userState.tickets <= 0) {
                        showModal("🎟️ 抽獎券不足！\n請繼續探索地圖累積步數\n（每 100 步 = 1 張）。");
                        return;
                    }
                    userState.usedTickets += 1;
                    updateTicketsUI();
                    saveState();
                }

                isDrawing = true;
                drawBtn.disabled = true;
                drawBtn.classList.add('opacity-50', 'cursor-not-allowed');
                drawBtn.innerHTML = '<div class="w-6 h-6 border-4 border-yellow-900 border-t-transparent rounded-full animate-spin"></div> 抽取中...';
                
                document.getElementById('gift-box-icon').classList.add('hidden');
                document.getElementById('gift-image').classList.add('hidden');
                document.getElementById('gift-name').classList.add('hidden');
                document.getElementById('draw-result').classList.add('hidden');
                document.getElementById('draw-effect').classList.remove('hidden');
                document.getElementById('draw-effect').classList.add('flex');
                
                ws.send(JSON.stringify({ type: 'draw_gift', uid: userState.uid, userName: userState.userName }));
            };

            // 每 10 秒儲存一次狀態並清理舊軌跡
            setInterval(() => {
                if (userState.history.length > 50) {
                    userState.history = optimizeHistory(userState.history);
                }
                saveState();
            }, 10000);
        }

        let marqueeTimeout;
        function showMarquee(text) {
            const container = document.getElementById('winner-marquee');
            const content = document.getElementById('marquee-text');
            content.innerText = text;
            container.classList.remove('hidden');
            
            clearTimeout(marqueeTimeout);
            marqueeTimeout = setTimeout(() => {
                container.classList.add('hidden');
            }, 15000);
        }

        function drawEvaGrid() {
            if (!isShowingEvaGrid || !userState.lat || !userState.lng) return;
            evaGridLayer.clearLayers();
            
            const center = L.latLng(userState.lat, userState.lng);
            const r = 500; // 500米半徑
            
            L.circle(center, {
                color: '#8b5cf6', fillColor: '#c4b5fd', fillOpacity: 0.1, weight: 2, dashArray: '5,10'
            }).addTo(evaGridLayer);
            
            for (let i = 0; i < 4; i++) {
                let p1 = map.project(center, 15);
                let angle = i * Math.PI / 4;
                let dx = Math.cos(angle) * r;
                let dy = Math.sin(angle) * r;
                
                let latlng1 = map.unproject(L.point(p1.x + dx, p1.y + dy), 15);
                let latlng2 = map.unproject(L.point(p1.x - dx, p1.y - dy), 15);
                
                L.polyline([latlng1, latlng2], {color: '#8b5cf6', weight: 1, opacity: 0.5}).addTo(evaGridLayer);
            }
        }

        function handlePositionUpdate(pos) {
            const newLat = pos.coords.latitude;
            const newLng = pos.coords.longitude;
            const now = Date.now();

            if (!userState.lat || !userState.lng) {
                userState.lat = newLat;
                userState.lng = newLng;
                userState.history.push({ lat: newLat, lng: newLng, timestamp: now });
            } else {
                const dist = map.distance([userState.lat, userState.lng], [newLat, newLng]);
                if (dist > MIN_DISTANCE_METERS) {
                    userState.lat = newLat;
                    userState.lng = newLng;
                    userState.history.push({ lat: newLat, lng: newLng, timestamp: now });
                }
            }

            calculateSteps();
            updateTicketsUI();
            
            document.getElementById('step-count').innerText = userState.steps;
            document.getElementById('coord-display').innerText = `${newLat.toFixed(5)}, ${newLng.toFixed(5)}`;
            
            let currentLevel = Math.floor(userState.steps / 500) + 1;
            document.getElementById('user-level').innerText = currentLevel;

            if (myLocationMarker) {
                myLocationMarker.setLatLng([newLat, newLng]);
            } else {
                myLocationMarker = L.marker([newLat, newLng], { icon: MY_ICON, zIndexOffset: 1000 }).addTo(map);
            }

            if (isShowingMyRoute && currentMyRoutePath) {
                currentMyRoutePath.setLatLngs(userState.history.map(p => [p.lat, p.lng]));
            }
            if (isShowingEvaGrid) drawEvaGrid();
            if (fogLayer) fogLayer._update();

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'update_location', uid: userState.uid, data: userState }));
            }
        }

        function startTracking() {
            if (navigator.geolocation && !isLocating) {
                isLocating = true;
                updateInterval = setInterval(() => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => handlePositionUpdate(pos),
                        (err) => console.log(err),
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                }, 5000); // 每 5 秒更新一次
            }
        }

        function updateSightings() {
            markersLayer.clearLayers();
            for (const id in dbState.sightings) {
                const s = dbState.sightings[id];
                const iconHtml = ICONS[s.type] || ICONS['尋找'];
                const icon = L.divIcon({
                    html: `<div class="marker-icon">${iconHtml}</div>`,
                    className: 'custom-marker',
                    iconSize: [32, 32], iconAnchor: [16, 32]
                });
                
                let timeStr = new Date(s.timestamp).toLocaleString();
                const m = L.marker([s.lat, s.lng], { icon }).addTo(markersLayer);
                m.bindPopup(`<b>${s.type}</b><br>${s.description}<br><span class="text-xs text-gray-500">${timeStr}</span>`);
            }
        }

        function updateRoutes() {
            pathsLayer.clearLayers();
            for (const id in dbState.routes) {
                const r = dbState.routes[id];
                L.polyline(r.path, { color: r.color || 'red', weight: r.weight || 3, className: 'route-path' })
                 .bindPopup(`<b>${r.name}</b>`)
                 .addTo(pathsLayer);
            }
        }

        function updateUsers() {
            userMarkersLayer.clearLayers();
            let onlineCount = 1; 
            const now = Date.now();
            
            for (const uid in dbState.locations) {
                if (uid === userState.uid) continue;
                
                const u = dbState.locations[uid];
                let lastPt = u.history && u.history.length > 0 ? u.history[u.history.length - 1] : null;
                
                if (lastPt && (now - (lastPt.timestamp || 0)) < 300000) { // 5分鐘內算在線
                    onlineCount++;
                    const m = L.marker([lastPt.lat, lastPt.lng], { icon: OTHER_ICON }).addTo(userMarkersLayer);
                    m.bindPopup(`<b>${u.userName || '匿名玩家'}</b><br>步數: ${u.steps || 0}`);
                }
            }
            document.getElementById('online-count').innerText = onlineCount;
        }

        function updateAnnouncement() {
            const ann = document.getElementById('announcement');
            const text = document.getElementById('announcement-text');
            if (dbState.announcements && dbState.announcements.current) {
                text.innerText = dbState.announcements.current;
                ann.classList.remove('hidden');
            } else {
                ann.classList.add('hidden');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
