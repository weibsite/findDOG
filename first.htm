<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛小孩協尋中心 - 首頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        .link-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
    <!-- Add Noto Sans TC for better Chinese font support -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-amber-500 text-white p-6 shadow-md text-center">
        <h1 class="text-3xl font-bold">毛小孩協尋中心</h1>
        <p class="mt-2 text-amber-100">幫助迷失的毛小孩找到回家的路</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12 flex items-center justify-center">
        <!-- Grid for the three links -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl">

            <!-- Link 1: 尋寵地圖 -->
            <a href="index.htm" class="block bg-white rounded-2xl overflow-hidden shadow-md link-card flex flex-col group text-center cursor-pointer">
                <div class="w-full aspect-square overflow-hidden bg-gray-200">
                    <img src="image_og1.png" alt="尋寵地圖" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/500x500/f87171/ffffff?text=圖片載入中...'">
                </div>
                <div class="p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2 group-hover:text-amber-600 transition-colors">尋寵地圖</h2>
                    <p class="text-gray-600">找回毛小孩的路</p>
                </div>
            </a>

            <!-- Link 2: 浪浪地圖 -->
            <a href="runrun.htm" class="block bg-white rounded-2xl overflow-hidden shadow-md link-card flex flex-col group text-center cursor-pointer">
                <div class="w-full aspect-square overflow-hidden bg-gray-200">
                    <img src="image_og2.png" alt="浪浪地圖" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/500x500/fbbf24/ffffff?text=圖片載入中...'">
                </div>
                <div class="p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2 group-hover:text-amber-600 transition-colors">浪浪地圖</h2>
                    <p class="text-gray-600">幫浪浪找回家</p>
                </div>
            </a>

            <!-- Link 3: 申請協尋 -->
            <a href="helpme.htm" class="block bg-white rounded-2xl overflow-hidden shadow-md link-card flex flex-col group text-center cursor-pointer">
                <div class="w-full aspect-square overflow-hidden bg-gray-200">
                    <img src="image_og3.png" alt="申請協尋" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/500x500/34d399/ffffff?text=圖片載入中...'">
                </div>
                <div class="p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2 group-hover:text-amber-600 transition-colors">申請協尋</h2>
                    <p class="text-gray-600">協尋申請、協尋管理</p>
                </div>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white text-center p-4">
        <p>&copy; 2026 毛小孩協尋中心. All rights reserved.</p>
    </footer>

</body>
</html>
