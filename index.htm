<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尋狗地圖 - 線上部署版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #2d3748; font-family: 'Courier New', Courier, monospace; }
        #map-container { position: relative; width: 100vw; height: 100vh; }
        #map { width: 100%; height: 100%; background-color: #1a202c; }
        
        .pixel-panel { background-color: white; border: 4px solid #1a202c; box-shadow: 6px 6px 0px #1a202c; border-radius: 0px !important; }
        .pixel-btn { background-color: #f59e0b; color: #1a202c; border: 4px solid #1a202c; box-shadow: 6px 6px 0px #1a202c; border-radius: 0px !important; transition: all 0.1s; text-transform: uppercase; font-weight: 900; cursor: pointer; }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px #1a202c; }
        .pixel-input { border: 4px solid #1a202c; border-radius: 0px !important; outline: none; font-weight: bold; }
        .pixel-input:focus { background-color: #fef3c7; }
        .custom-div-icon { background: transparent !important; border: none !important; overflow: visible !important; }
        .user-label-container { position: absolute; bottom: 4px; left: -60px; width: 120px; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
        .user-avatar-pixel { width: 16px; height: 16px; border: 3px solid #1a202c; box-sizing: border-box; }
        .user-name-tag { background: white; padding: 2px 6px; border: 2px solid #1a202c; font-size: 12px; font-weight: 900; white-space: nowrap; margin-bottom: 6px; }
        .pixel-popup .leaflet-popup-content-wrapper { background-color: white; border: 4px solid #1a202c; border-radius: 0; box-shadow: 4px 4px 0px #1a202c; padding: 0; }
        .pixel-popup .leaflet-popup-tip-container { display: none; }
        .blinking-red-pixel { animation: blink-pixel 1s infinite alternate; }
        @keyframes blink-pixel { 0% { background-color: #ef4444; transform: scale(1); } 100% { background-color: #fca5a5; transform: scale(1.3); } }
        @keyframes pulse-square { 0% { transform: scale(0.5); opacity: 1; border-width: 4px; } 100% { transform: scale(4); opacity: 0; border-width: 1px; } }
        .center-pulse-square { position: absolute; left: -16px; top: -16px; width: 32px; height: 32px; border: 4px solid #ef4444; box-sizing: border-box; animation: pulse-square 2s infinite linear; pointer-events: none; }
        
        #sightings-list-container::-webkit-scrollbar, #routes-list-container::-webkit-scrollbar { width: 8px; }
        #sightings-list-container::-webkit-scrollbar-track, #routes-list-container::-webkit-scrollbar-track { background: #f1f1f1; border: 2px solid #1a202c; }
        #sightings-list-container::-webkit-scrollbar-thumb, #routes-list-container::-webkit-scrollbar-thumb { background: #1a202c; }
    </style>
</head>
<body>

    <div id="map-container"><div id="map"></div></div>

    <div id="startup-overlay" class="absolute inset-0 z-[3000] bg-black/70 flex items-center justify-center transition-opacity duration-300">
        <div class="pixel-panel p-6 w-11/12 max-w-md text-center transform transition-transform">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">尋狗地圖</h2>
            <p class="text-gray-700 mb-4 text-sm font-bold">▶ 其他縣市可以按左下觀看模式觀看 ◀<br><br>請輸入稱呼並允許定位，您的移動將以像素方塊驅散周圍迷霧！</p>
            <input type="text" id="user-name-input" maxlength="15" placeholder="暱稱 (留空則隨機)" class="pixel-input w-full p-3 text-lg mb-4 text-center text-gray-900" />
            <button id="master-start-btn" class="pixel-btn w-full py-4 px-4 text-lg">開始 [暫時授權定位]</button>
            <div id="error-msg" class="hidden"></div>
        </div>
    </div>

    <!-- 各式 Modal (對話框) -->
    <div id="custom-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4"><div class="pixel-panel p-6 w-full max-w-sm text-center"><p id="custom-modal-text" class="text-gray-900 font-bold mb-6 text-sm leading-relaxed"></p><button id="custom-modal-btn" class="pixel-btn w-full py-2 bg-blue-500 text-white">確定</button></div></div>
    <div id="input-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4"><div class="pixel-panel p-6 w-full max-w-sm text-center"><h3 id="input-modal-title" class="text-gray-900 font-bold mb-4"></h3><textarea id="input-modal-text" class="pixel-input w-full p-2 mb-4 h-32" placeholder="請輸入內容..."></textarea><div class="flex gap-2"><button id="input-cancel-btn" class="pixel-btn flex-1 py-2 bg-gray-400">取消</button><button id="input-submit-btn" class="pixel-btn flex-1 py-2 bg-blue-500 text-white">確定</button></div></div></div>
    <div id="confirm-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4"><div class="pixel-panel p-6 w-full max-w-sm text-center"><p id="confirm-modal-text" class="text-gray-900 font-bold mb-6 text-sm leading-relaxed"></p><div class="flex gap-2"><button id="confirm-cancel-btn" class="pixel-btn flex-1 py-2 bg-gray-400">取消</button><button id="confirm-ok-btn" class="pixel-btn flex-1 py-2 bg-red-500 text-white">確定</button></div></div></div>
    <div id="admin-login-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4"><div class="pixel-panel p-6 w-full max-w-sm text-center"><h3 class="text-gray-900 font-bold mb-4 text-xl">👑 管理員登入</h3><input type="password" id="admin-pwd-input" class="pixel-input w-full p-3 mb-4 text-center font-sans" placeholder="請輸入密碼"><div class="flex gap-2"><button id="admin-cancel-btn" class="pixel-btn flex-1 py-2 bg-gray-400">取消</button><button id="admin-submit-btn" class="pixel-btn flex-1 py-2 bg-red-500 text-white">登入</button></div></div></div>

    <!-- 選擇定位方式 Modal -->
    <div id="position-method-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4">
        <div class="pixel-panel p-6 w-full max-w-sm text-center">
            <h3 class="text-gray-900 font-bold mb-4 text-xl">📍 選擇定位方式</h3>
            <p class="text-gray-700 mb-6 text-sm font-bold">請選擇如何指定此出沒點的地理位置：</p>
            <div class="flex flex-col gap-3">
                <button id="pos-method-map-btn" class="pixel-btn w-full py-3 bg-green-500 text-white">🖱️ 在地圖上點擊選點</button>
                <button id="pos-method-input-btn" class="pixel-btn w-full py-3 bg-blue-500 text-white">✍️ 手動輸入經緯度座標</button>
                <button id="pos-method-cancel-btn" class="pixel-btn w-full py-2 bg-gray-400">取消</button>
            </div>
        </div>
    </div>

    <!-- 輸入經緯度座標 Modal -->
    <div id="coordinate-input-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4">
        <div class="pixel-panel p-6 w-full max-w-sm text-center">
            <h3 class="text-gray-900 font-bold mb-4 text-xl">✍️ 輸入座標</h3>
            <input type="text" id="coord-input-value" class="pixel-input w-full p-3 text-sm mb-4 text-center text-gray-900 font-mono" placeholder="貼上或輸入座標..." />
            <div class="flex gap-2">
                <button id="coord-cancel-btn" class="pixel-btn flex-1 py-2 bg-gray-400">取消</button>
                <button id="coord-submit-btn" class="pixel-btn flex-1 py-2 bg-blue-500 text-white">確定</button>
            </div>
        </div>
    </div>

    <!-- 管理出沒點列表 Modal -->
    <div id="manage-sightings-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4">
        <div class="pixel-panel p-4 w-full max-w-md h-[75vh] flex flex-col">
            <h3 class="text-gray-900 font-bold mb-3 text-lg text-center border-b-2 border-black pb-2">📋 管理出沒點</h3>
            <div id="sightings-list-container" class="flex-1 overflow-y-auto mb-4 space-y-3 pr-2"></div>
            <button id="close-manage-modal-btn" class="pixel-btn w-full py-3 bg-gray-400 text-white">關閉列表</button>
        </div>
    </div>

    <!-- ================= 新增：路線繪製面板 (預設隱藏) ================= -->
    <div id="route-drawing-panel" class="hidden absolute top-20 left-1/2 transform -translate-x-1/2 z-[3000] pixel-panel p-4 bg-white/95 w-11/12 max-w-sm">
        <h3 class="text-center font-bold mb-2 text-red-600 border-b-2 border-black pb-1">🗺️ 繪製路線模式</h3>
        <p class="text-xs text-gray-700 font-bold mb-3 text-center">請直接在「地圖上點擊」來增加路線節點。</p>
        <input type="text" id="route-name" placeholder="路線名稱 (如: 飼主移動路線)" class="pixel-input w-full p-2 mb-3 text-sm font-bold">
        <div class="flex gap-4 mb-3 items-center">
            <div class="flex-col flex items-center">
                <label class="text-xs font-bold mb-1">顏色</label>
                <input type="color" id="route-color" value="#ff0000" class="w-10 h-10 p-0 border-2 border-black cursor-pointer">
            </div>
            <div class="flex-1">
                <label class="text-xs font-bold mb-1 block">粗細: <span id="route-weight-val">5</span>px</label>
                <input type="range" id="route-weight" min="2" max="12" value="5" class="w-full cursor-pointer">
            </div>
        </div>
        <div class="flex gap-2">
            <button id="route-undo-btn" class="pixel-btn flex-1 py-2 bg-yellow-400 text-xs">↩️ 復原</button>
            <button id="route-cancel-btn" class="pixel-btn flex-1 py-2 bg-gray-400 text-xs">❌ 取消</button>
            <button id="route-finish-btn" class="pixel-btn flex-1 py-2 bg-green-500 text-white text-xs">✅ 完成</button>
        </div>
    </div>
    
    <!-- ================= 新增：管理路線 Modal ================= -->
    <div id="manage-routes-modal" class="hidden absolute inset-0 z-[8000] bg-black/80 flex items-center justify-center p-4">
        <div class="pixel-panel p-4 w-full max-w-md h-[75vh] flex flex-col">
            <h3 class="text-gray-900 font-bold mb-3 text-lg text-center border-b-2 border-black pb-2">🛤️ 管理路線</h3>
            <div id="routes-list-container" class="flex-1 overflow-y-auto mb-4 space-y-3 pr-2"></div>
            <button id="close-manage-routes-btn" class="pixel-btn w-full py-3 bg-gray-400 text-white">關閉列表</button>
        </div>
    </div>

    <!-- ================= 新增：編輯路線屬性 Modal ================= -->
    <div id="edit-route-modal" class="hidden absolute inset-0 z-[9000] bg-black/80 flex items-center justify-center p-4">
        <div class="pixel-panel p-6 w-full max-w-sm text-center">
            <h3 class="font-bold mb-4 text-lg">📝 編輯路線屬性</h3>
            <input type="text" id="edit-route-name" class="pixel-input w-full p-2 mb-3 font-bold" placeholder="路線名稱">
            <div class="flex gap-4 mb-4 items-center">
                <div class="flex-col flex items-center">
                    <label class="text-xs font-bold mb-1">顏色</label>
                    <input type="color" id="edit-route-color" class="w-10 h-10 p-0 border-2 border-black cursor-pointer">
                </div>
                <div class="flex-1">
                    <label class="text-xs font-bold mb-1 block">粗細: <span id="edit-route-weight-val">5</span>px</label>
                    <input type="range" id="edit-route-weight" min="2" max="12" class="w-full cursor-pointer">
                </div>
            </div>
            <div class="flex gap-2">
                <button id="edit-route-cancel" class="pixel-btn flex-1 py-2 bg-gray-400">取消</button>
                <button id="edit-route-save" class="pixel-btn flex-1 py-2 bg-blue-500 text-white">儲存</button>
            </div>
        </div>
    </div>

    <div id="status-toast" class="absolute top-4 right-4 z-[2000] pixel-panel p-2 text-sm font-bold text-gray-900 hidden flex items-center gap-2"><div class="w-3 h-3 bg-red-500 border-2 border-black" id="sync-ping"></div><span id="toast-text">斷線中...</span></div>
    
    <div id="announcement-panel" class="absolute top-16 right-4 z-[2000] pixel-panel p-3 text-[10px] sm:text-xs font-bold text-gray-900 bg-white/95 w-48 sm:w-56 pointer-events-auto shadow-md transition-all duration-300">
        <div class="text-red-600 mb-1 border-b-2 border-black pb-1 text-xs sm:text-sm flex justify-between items-center">
            <span>📢 最新公告</span>
            <button id="toggle-announce-panel-btn" class="ml-2 px-1 py-0.5 border-2 border-black bg-yellow-400 hover:bg-yellow-500 active:translate-x-[1px] active:translate-y-[1px] text-black font-extrabold cursor-pointer text-[10px]" style="box-shadow: 2px 2px 0px #1a202c; line-height: 1;">➖</button>
        </div>
        <div id="announcement-text" class="leading-relaxed mt-2 whitespace-pre-wrap transition-all duration-300">載入中...</div>
    </div>
    
    <!-- 管理員面板 (加入路線管理) -->
    <div id="admin-panel" class="absolute top-4 left-4 z-[2000] pixel-panel p-2 hidden bg-white/95 w-36 border-red-500 shadow-[6px_6px_0px_rgba(239,68,68,1)]">
        <div class="text-red-600 mb-2 border-b-2 border-black pb-1 text-xs font-bold text-center">👑 管理員工具</div>
        <button id="add-sighting-btn" class="pixel-btn w-full p-2 mb-2 text-xs bg-green-500 text-white">📍 增設出沒點</button>
        <button id="manage-sightings-btn" class="pixel-btn w-full p-2 mb-2 text-xs bg-blue-500 text-white">📋 管理出沒點</button>
        <button id="add-route-btn" class="pixel-btn w-full p-2 mb-2 text-xs bg-orange-500 text-white">🗺️ 繪製路線</button>
        <button id="manage-routes-btn" class="pixel-btn w-full p-2 mb-2 text-xs bg-indigo-500 text-white">🛤️ 管理路線</button>
        <button id="update-announce-btn" class="pixel-btn w-full p-2 text-xs bg-purple-500 text-white">📢 更新公告</button>
    </div>

    <!-- UI 按鈕 -->
    <button id="force-upload-btn" class="absolute bottom-56 left-4 z-[2000] pixel-btn p-2 text-xs hidden">📤 強制打卡</button>
    <button id="nav-pin-btn" class="absolute bottom-44 left-4 z-[2000] pixel-btn p-2 text-xs hidden">📍 導航標記</button>
    <button id="toggle-fog-btn" class="absolute bottom-32 left-4 z-[2000] pixel-btn p-2 text-xs hidden">👁️ 關閉迷霧</button>
    <button id="spectator-btn" class="absolute bottom-20 left-4 z-[2000] pixel-btn p-2 text-xs hidden">觀看模式</button>
    <button id="locate-btn" class="absolute bottom-8 left-4 z-[2000] pixel-btn p-3 hidden flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="3" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v2m0 16v2m10-10h-2M4 12H2" /></svg></button>

    <div class="absolute bottom-24 right-4 sm:bottom-20 sm:right-4 z-[2000] pixel-panel p-2 text-[10px] sm:text-xs font-bold text-gray-900 bg-white/90 text-right pointer-events-auto">版權所有，桃園八德阿偉製作<br><a href="mailto:mi000731@gmail.com" class="text-blue-700 hover:text-blue-900 hover:underline">mi000731@gmail.com</a><div class="mt-1 pt-1 border-t-2 border-gray-300 text-gray-400 cursor-pointer hover:text-red-500 text-[10px]" id="admin-login-trigger">管理員登入</div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const NGROK_WS_URL = "wss://below-syracuse-hey-surgery.trycloudflare.com/ws"; // 替換為您的 WS 網址

        // --- 狀態變數 ---
        let map, markersLayer, sightingsLayer, routesLayer;
        let ws; 
        
        let myUid = localStorage.getItem('dogMap_UID');
        if (!myUid) { myUid = 'usr_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('dogMap_UID', myUid); }
        let currentUserName = ""; let dbUserColor = ""; 
        
        let localHistory = []; 
        try {
            const storedHistory = localStorage.getItem('dogMap_localHistory');
            if (storedHistory) localHistory = JSON.parse(storedHistory);
        } catch(e) { console.error("解析本地歷史紀錄失敗", e); }
        let lastSavedPos = localHistory.length > 0 ? localHistory[localHistory.length - 1] : null;

        let allUsersData = {};
        let allSightings = {};
        let allRoutes = {}; // 儲存所有路線
        
        try {
            const storedSightings = localStorage.getItem('dogMap_cachedSightings');
            if (storedSightings) allSightings = JSON.parse(storedSightings);
            const storedRoutes = localStorage.getItem('dogMap_cachedRoutes');
            if (storedRoutes) allRoutes = JSON.parse(storedRoutes);
        } catch(e) {}
        
        let watchId = null; let isSystemReady = false; let isSpectatorMode = false; 
        let isAdmin = sessionStorage.getItem('dogMap_isAdmin') === 'true';
        let isFogVisible = true; let navMarker = null;

        // 迷霧系統變數
        let fogCanvas, fogCtx, lowResCanvas, lowResCtx, tempCanvas, tempCtx;
        let fogRenderPending = false; const FOG_SCALE = 0.08;
        const LOST_DOG_CENTER = [23.7509678, 120.3995609];

        // 路線繪製變數
        let isDrawingRoute = false;
        let currentRoutePoints = [];
        let currentRoutePolyline = null;
        let currentRouteMarkers = [];
        let editingRouteId = null;

        // --- DOM 元素 (略縮版宣告) ---
        const startupOverlay = document.getElementById('startup-overlay');
        const nameInput = document.getElementById('user-name-input');
        const masterStartBtn = document.getElementById('master-start-btn');
        const errorMsg = document.getElementById('error-msg');
        const statusToast = document.getElementById('status-toast');
        const toastText = document.getElementById('toast-text');
        const locateBtn = document.getElementById('locate-btn');
        const spectatorBtn = document.getElementById('spectator-btn');
        const customModal = document.getElementById('custom-modal');
        const customModalText = document.getElementById('custom-modal-text');
        const customModalBtn = document.getElementById('custom-modal-btn');
        const toggleFogBtn = document.getElementById('toggle-fog-btn');
        const navPinBtn = document.getElementById('nav-pin-btn');
        const forceUploadBtn = document.getElementById('force-upload-btn');
        const adminLoginTrigger = document.getElementById('admin-login-trigger');
        const adminPanel = document.getElementById('admin-panel');

        const manageSightingsModal = document.getElementById('manage-sightings-modal');
        const manageRoutesModal = document.getElementById('manage-routes-modal');
        const sightingsListContainer = document.getElementById('sightings-list-container');
        const routesListContainer = document.getElementById('routes-list-container');
        const positionMethodModal = document.getElementById('position-method-modal');
        const coordinateInputModal = document.getElementById('coordinate-input-modal');
        const routeDrawingPanel = document.getElementById('route-drawing-panel');
        const toggleAnnouncePanelBtn = document.getElementById('toggle-announce-panel-btn');
        const announcementText = document.getElementById('announcement-text');
        let isAnnounceCollapsed = localStorage.getItem('dogMap_announceCollapsed') === 'true';

        function escapeHTML(str) { return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        function showModal(msg) { customModalText.innerText = msg; customModal.classList.remove('hidden'); }
        customModalBtn.addEventListener('click', () => { customModal.classList.add('hidden'); });

        function showInputModal(title, placeholder, defaultValue, onSubmit) {
            document.getElementById('input-modal-title').innerText = title;
            const textInput = document.getElementById('input-modal-text');
            textInput.placeholder = placeholder; textInput.value = defaultValue;
            document.getElementById('input-modal').classList.remove('hidden');
            const submitBtn = document.getElementById('input-submit-btn');
            const cancelBtn = document.getElementById('input-cancel-btn');
            const newSubmit = submitBtn.cloneNode(true), newCancel = cancelBtn.cloneNode(true);
            submitBtn.parentNode.replaceChild(newSubmit, submitBtn); cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
            newSubmit.addEventListener('click', () => {
                const val = document.getElementById('input-modal-text').value.trim();
                if(val) { document.getElementById('input-modal').classList.add('hidden'); onSubmit(val); } else { showModal("內容不能為空白！"); }
            });
            newCancel.addEventListener('click', () => { document.getElementById('input-modal').classList.add('hidden'); });
        }

        function showConfirm(msg, onConfirm) {
            document.getElementById('confirm-modal-text').innerText = msg; document.getElementById('confirm-modal').classList.remove('hidden');
            const okBtn = document.getElementById('confirm-ok-btn'), cancelBtn = document.getElementById('confirm-cancel-btn');
            const newOk = okBtn.cloneNode(true), newCancel = cancelBtn.cloneNode(true);
            okBtn.parentNode.replaceChild(newOk, okBtn); cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
            newOk.addEventListener('click', () => { document.getElementById('confirm-modal').classList.add('hidden'); onConfirm(); });
            newCancel.addEventListener('click', () => { document.getElementById('confirm-modal').classList.add('hidden'); });
        }
        function generateRandomColor() { const colors = ['#3b82f6', '#10b981', '#8b5cf6', '#f97316', '#ec4899', '#06b6d4']; return colors[Math.floor(Math.random() * colors.length)]; }

        // --- WebSocket 與 初始化 ---
        function connectWebSocket() {
            ws = new WebSocket(NGROK_WS_URL);
            ws.onopen = () => {
                isSystemReady = true; document.getElementById('sync-ping').style.backgroundColor = '#10b981';
                toastText.innerText = "連線成功"; if(localHistory.length > 0) saveLocationToServer(); 
            };
            ws.onmessage = (event) => {
                const response = JSON.parse(event.data);
                if (response.type === 'sync') {
                    allUsersData = response.data.locations;
                    allSightings = response.data.sightings;
                    allRoutes = response.data.routes || {}; // 接收路線
                    
                    localStorage.setItem('dogMap_cachedSightings', JSON.stringify(allSightings));
                    localStorage.setItem('dogMap_cachedRoutes', JSON.stringify(allRoutes));
                    localStorage.setItem('dogMap_cachedAnnounce', response.data.announcements.current);
                    document.getElementById('announcement-text').innerHTML = escapeHTML(response.data.announcements.current).replace(/\n/g, '<br>');
                    
                    renderMap(); renderSightings(); renderRoutes();
                    if(!manageSightingsModal.classList.contains('hidden')) renderManageSightingsList();
                    if(!manageRoutesModal.classList.contains('hidden')) renderManageRoutesList();
                }
            };
            ws.onclose = () => {
                isSystemReady = false; document.getElementById('sync-ping').style.backgroundColor = '#ef4444';
                toastText.innerText = "斷線重連中..."; setTimeout(connectWebSocket, 3000); 
            };
        }

        async function initSystem() {
            map = L.map('map', { zoomControl: false }).setView(LOST_DOG_CENTER, 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            
            markersLayer = L.layerGroup().addTo(map);
            sightingsLayer = L.layerGroup().addTo(map);
            routesLayer = L.layerGroup().addTo(map); // 路線圖層

            // 綁定地圖點擊事件 (路線繪製專用)
            map.on('click', (e) => {
                if (isDrawingRoute) {
                    currentRoutePoints.push([e.latlng.lat, e.latlng.lng]);
                    updateDrawingRoutePreview();
                }
            });

            const centerIcon = L.divIcon({ className: 'custom-div-icon', html: `<div style="position: absolute;"><div class="center-pulse-square"></div></div><div class="user-label-container" style="bottom: 12px;"><div class="user-name-tag pixel-panel" style="color: white; background-color: #ef4444; border-color: #1a202c; z-index: 10;">📍 走失中心</div><div style="font-size: 24px; filter: drop-shadow(2px 2px 0px #1a202c); position: relative; z-index: 10;">🐕</div></div>`, iconSize: [0, 0], iconAnchor: [0, 0] });
            L.marker(LOST_DOG_CENTER, { icon: centerIcon, zIndexOffset: 100 }).addTo(map);
            
            map.createPane('fogPane'); map.getPane('fogPane').style.zIndex = 450; map.getPane('fogPane').style.pointerEvents = 'none';
            initFogSystem();
            setInterval(renderMap, 15000);
            
            if (isAdmin) { adminLoginTrigger.classList.add('hidden'); adminPanel.classList.remove('hidden'); }
            
            const cachedAnnounce = localStorage.getItem('dogMap_cachedAnnounce');
            if (cachedAnnounce) document.getElementById('announcement-text').innerHTML = escapeHTML(cachedAnnounce).replace(/\n/g, '<br>');
            
            renderSightings(); renderRoutes(); applyAnnouncePanelCollapseState();
            connectWebSocket(); checkLocalSetupAndStart();
        }

        toggleAnnouncePanelBtn.addEventListener('click', () => {
            isAnnounceCollapsed = !isAnnounceCollapsed;
            localStorage.setItem('dogMap_announceCollapsed', isAnnounceCollapsed); applyAnnouncePanelCollapseState();
        });
        function applyAnnouncePanelCollapseState() {
            if (isAnnounceCollapsed) { announcementText.classList.add('hidden'); toggleAnnouncePanelBtn.innerText = '➕'; } 
            else { announcementText.classList.remove('hidden'); toggleAnnouncePanelBtn.innerText = '➖'; }
        }

        // --- 管理員登入 ---
        adminLoginTrigger.addEventListener('click', () => { document.getElementById('admin-login-modal').classList.remove('hidden'); document.getElementById('admin-pwd-input').value = ""; });
        document.getElementById('admin-cancel-btn').addEventListener('click', () => { document.getElementById('admin-login-modal').classList.add('hidden'); });
        document.getElementById('admin-submit-btn').addEventListener('click', () => {
            const pwd = document.getElementById('admin-pwd-input').value.trim(); const targetHash = "=kDM2AzN4ImQ"; const inputHash = btoa(pwd).split('').reverse().join('');
            if (inputHash === targetHash) { isAdmin = true; sessionStorage.setItem('dogMap_isAdmin', 'true'); document.getElementById('admin-login-modal').classList.add('hidden'); adminLoginTrigger.classList.add('hidden'); adminPanel.classList.remove('hidden'); showModal("登入成功！"); } else { showModal("密碼錯誤。"); }
        });

        // 增設出沒點、公告邏輯 (簡化省略部分代碼，保留原功能)
        document.getElementById('add-sighting-btn').addEventListener('click', () => {
            if(!isAdmin) return;
            showInputModal("📍 新增出沒點", "請詳細描述此事件點...", "", (desc) => { positionMethodModal.classList.remove('hidden'); /* 選點邏輯如原本一樣 */ });
        });
        document.getElementById('manage-sightings-btn').addEventListener('click', () => {
            if(!isAdmin) return;
            renderManageSightingsList(); manageSightingsModal.classList.remove('hidden');
        });
        document.getElementById('close-manage-modal-btn').addEventListener('click', () => manageSightingsModal.classList.add('hidden') );
        
        function renderManageSightingsList() { /* 原本邏輯 */ }
        function renderSightings() { /* 原本邏輯 */ }

        // ================= 路線繪製系統 =================
        document.getElementById('route-weight').addEventListener('input', (e) => { document.getElementById('route-weight-val').innerText = e.target.value; updateDrawingRoutePreview(); });
        document.getElementById('route-color').addEventListener('input', updateDrawingRoutePreview);

        document.getElementById('add-route-btn').addEventListener('click', () => {
            if(!isAdmin) return;
            isDrawingRoute = true; currentRoutePoints = [];
            document.getElementById('route-name').value = '';
            routeDrawingPanel.classList.remove('hidden');
            adminPanel.classList.add('hidden'); 
            showModal("🗺️ 進入路線繪製模式！\n請直接在地圖上「點擊」來新增路線節點。");
            updateDrawingRoutePreview();
        });

        document.getElementById('route-undo-btn').addEventListener('click', () => {
            if (currentRoutePoints.length > 0) { currentRoutePoints.pop(); updateDrawingRoutePreview(); }
        });

        document.getElementById('route-cancel-btn').addEventListener('click', () => exitRouteDrawingMode());

        document.getElementById('route-finish-btn').addEventListener('click', () => {
            if (currentRoutePoints.length < 2) { showModal("⚠️ 路線至少需要兩個節點才能成線！"); return; }
            const name = document.getElementById('route-name').value.trim() || '未命名路線';
            const color = document.getElementById('route-color').value;
            const weight = parseInt(document.getElementById('route-weight').value);
            
            if(isSystemReady) {
                ws.send(JSON.stringify({ type: "add_route", data: { name, color, weight, points: currentRoutePoints, timestamp: Date.now() } }));
                showModal("✅ 路線已成功發布推播！"); exitRouteDrawingMode();
            } else { showModal("⚠️ 系統未連線！"); }
        });

        function exitRouteDrawingMode() {
            isDrawingRoute = false; routeDrawingPanel.classList.add('hidden'); adminPanel.classList.remove('hidden');
            if (currentRoutePolyline) map.removeLayer(currentRoutePolyline);
            currentRouteMarkers.forEach(m => map.removeLayer(m));
            currentRoutePolyline = null; currentRouteMarkers = [];
        }

        function updateDrawingRoutePreview() {
            if (currentRoutePolyline) map.removeLayer(currentRoutePolyline);
            currentRouteMarkers.forEach(m => map.removeLayer(m)); currentRouteMarkers = [];
            const color = document.getElementById('route-color').value; const weight = parseInt(document.getElementById('route-weight').value);
            if (currentRoutePoints.length > 0) {
                currentRoutePolyline = L.polyline(currentRoutePoints, { color, weight, dashArray: '5, 10' }).addTo(map);
                currentRoutePoints.forEach(pt => {
                    const marker = L.circleMarker(pt, { radius: 5, color: '#1a202c', weight: 2, fillColor: color, fillOpacity: 1 }).addTo(map);
                    currentRouteMarkers.push(marker);
                });
            }
        }

        function renderRoutes() {
            if (!routesLayer) return;
            routesLayer.clearLayers();
            Object.keys(allRoutes).forEach(id => {
                const r = allRoutes[id];
                if (!r.points || r.points.length === 0) return;
                const safeName = escapeHTML(r.name);
                const polyline = L.polyline(r.points, { color: r.color || '#ff0000', weight: r.weight || 5, opacity: 0.9 }).addTo(routesLayer);
                polyline.bindPopup(`<div class="font-bold text-center text-sm p-1 text-gray-900 border-b-2 border-black mb-1">${safeName}</div>`, { className: 'pixel-popup' });
            });
        }

        // ================= 路線管理系統 =================
        document.getElementById('manage-routes-btn').addEventListener('click', () => {
            if(!isAdmin) return;
            renderManageRoutesList(); manageRoutesModal.classList.remove('hidden');
        });
        document.getElementById('close-manage-routes-btn').addEventListener('click', () => manageRoutesModal.classList.add('hidden') );

        function renderManageRoutesList() {
            routesListContainer.innerHTML = '';
            const ids = Object.keys(allRoutes);
            if (ids.length === 0) { routesListContainer.innerHTML = '<p class="text-center text-gray-500 font-bold mt-8">目前沒有任何路線紀錄。</p>'; return; }
            ids.sort((a, b) => allRoutes[b].timestamp - allRoutes[a].timestamp);

            ids.forEach(id => {
                const data = allRoutes[id]; const safeName = escapeHTML(data.name);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'border-4 border-black p-3 bg-white shadow-[4px_4px_0px_#1a202c]';
                itemDiv.innerHTML = `
                    <div class="font-bold text-gray-900 mb-2 flex items-center gap-2">
                        <div class="w-4 h-4 border-2 border-black" style="background-color: ${data.color}"></div>
                        ${safeName} (粗細: ${data.weight})
                    </div>
                    <div class="flex gap-2">
                        <button class="edit-route-btn flex-1 bg-blue-500 text-white font-bold py-1 border-2 border-black hover:bg-blue-600 transition" data-id="${id}">📝 屬性</button>
                        <button class="delete-route-btn flex-1 bg-red-500 text-white font-bold py-1 border-2 border-black hover:bg-red-600 transition" data-id="${id}">🗑️ 刪除</button>
                    </div>
                `;
                routesListContainer.appendChild(itemDiv);
            });

            routesListContainer.querySelectorAll('.edit-route-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    editingRouteId = e.target.getAttribute('data-id');
                    const data = allRoutes[editingRouteId];
                    document.getElementById('edit-route-name').value = data.name;
                    document.getElementById('edit-route-color').value = data.color;
                    document.getElementById('edit-route-weight').value = data.weight;
                    document.getElementById('edit-route-weight-val').innerText = data.weight;
                    document.getElementById('edit-route-modal').classList.remove('hidden');
                });
            });

            routesListContainer.querySelectorAll('.delete-route-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.getAttribute('data-id');
                    showConfirm("確定要永久刪除這條路線嗎？", () => {
                        if(isSystemReady) { ws.send(JSON.stringify({ type: "delete_route", id: id })); showModal("✅ 刪除指令已送出！"); }
                    });
                });
            });
        }
        
        document.getElementById('edit-route-weight').addEventListener('input', (e) => { document.getElementById('edit-route-weight-val').innerText = e.target.value; });
        document.getElementById('edit-route-cancel').addEventListener('click', () => { document.getElementById('edit-route-modal').classList.add('hidden'); editingRouteId = null; });
        document.getElementById('edit-route-save').addEventListener('click', () => {
            if (!editingRouteId) return;
            const newName = document.getElementById('edit-route-name').value.trim() || '未命名路線';
            const newColor = document.getElementById('edit-route-color').value;
            const newWeight = parseInt(document.getElementById('edit-route-weight').value);
            
            if(isSystemReady) { 
                ws.send(JSON.stringify({ type: "edit_route", id: editingRouteId, data: { name: newName, color: newColor, weight: newWeight } })); 
                showModal("✅ 屬性已更新！"); document.getElementById('edit-route-modal').classList.add('hidden'); editingRouteId = null;
            }
        });

        // --- 迷霧與定位 ---
        function initFogSystem() {
            fogCanvas = document.createElement('canvas'); map.getPane('fogPane').appendChild(fogCanvas); fogCtx = fogCanvas.getContext('2d');
            lowResCanvas = document.createElement('canvas'); lowResCtx = lowResCanvas.getContext('2d');
            tempCanvas = document.createElement('canvas'); tempCtx = tempCanvas.getContext('2d');
            function resizeAndPositionCanvas() { fogCanvas.width = window.innerWidth; fogCanvas.height = window.innerHeight; const topLeft = map.containerPointToLayerPoint([0, 0]); L.DomUtil.setPosition(fogCanvas, topLeft); requestFogRender(); }
            window.addEventListener('resize', resizeAndPositionCanvas); map.on('move', resizeAndPositionCanvas); map.on('zoom', resizeAndPositionCanvas); resizeAndPositionCanvas();
        }
        function requestFogRender() { if (!fogRenderPending) { fogRenderPending = true; requestAnimationFrame(() => { if(isFogVisible) renderFog(); fogRenderPending = false; }); } }
        function renderFog() { /* 原本迷霧邏輯 */ }
        function checkLocalSetupAndStart() {
            const savedName = localStorage.getItem('dogMap_userName');
            const rawColor = localStorage.getItem('dogMap_userColor') || '';
            const savedColor = /^#[0-9a-fA-F]{6}$/i.test(rawColor) ? rawColor : null;
            if (savedName) {
                currentUserName = escapeHTML(savedName); dbUserColor = savedColor || generateRandomColor();
                if (!savedColor) localStorage.setItem('dogMap_userColor', dbUserColor);
                if (localHistory.length > 0) { allUsersData[myUid] = { userName: currentUserName, color: dbUserColor, history: [...localHistory], lastUpdate: Date.now() }; renderMap(); }
                finishUIReveal(); toastText.innerText = "自動定位..."; startLocationServices(true);
            } else { startupOverlay.style.display = 'flex'; startupOverlay.style.opacity = '1'; }
        }

        masterStartBtn.addEventListener('click', (e) => {
            e.preventDefault(); errorMsg.classList.add('hidden'); masterStartBtn.innerText = "連線中...";
            let name = nameInput.value.trim().replace(/[<>]/g, ''); if (!name) name = `P${Math.floor(100 + Math.random() * 900)}`;
            currentUserName = name; dbUserColor = generateRandomColor();
            localStorage.setItem('dogMap_userName', currentUserName); localStorage.setItem('dogMap_userColor', dbUserColor); startLocationServices(false);
        });

        function startLocationServices(isAutoStart) {
            if (!navigator.geolocation) { handleGeoError({code: 0, message: "瀏覽器不支援"}, isAutoStart); return; }
            navigator.geolocation.getCurrentPosition((pos) => { if (isSpectatorMode) return; handleValidPosition(pos.coords.latitude, pos.coords.longitude, Date.now()); finishUIReveal(); }, (err) => { handleGeoError(err, isAutoStart); }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition((pos) => { if (isSpectatorMode) return; handleValidPosition(pos.coords.latitude, pos.coords.longitude, Date.now()); }, (err) => { console.warn("Watch Geo Error:", err); }, { enableHighAccuracy: true, timeout: 20000, maximumAge: 5000 });
        }

        function finishUIReveal() {
            startupOverlay.style.opacity = '0'; setTimeout(() => { startupOverlay.style.display = 'none'; }, 300);
            statusToast.classList.remove('hidden'); locateBtn.classList.remove('hidden'); spectatorBtn.classList.remove('hidden'); toggleFogBtn.classList.remove('hidden'); navPinBtn.classList.remove('hidden'); forceUploadBtn.classList.remove('hidden'); toastText.innerText = "位置同步成功";
        }

        function handleValidPosition(lat, lng, timestamp) {
            if (isSpectatorMode) return; 
            if (localHistory.length === 0) map.setView([lat, lng], 17); 

            let shouldUpload = false;
            if (lastSavedPos) {
                const dist = getDistance(lastSavedPos.lat, lastSavedPos.lng, lat, lng);
                const timeElapsed = timestamp - lastSavedPos.timestamp;
                // ================= 修改：改為 50 公尺上傳一次 =================
                if (dist >= 50 || timeElapsed >= 3 * 60 * 1000) shouldUpload = true; 
                else return; 
            } else { shouldUpload = true; }

            const newPoint = { lat, lng, timestamp }; localHistory.push(newPoint); lastSavedPos = newPoint;
            localStorage.setItem('dogMap_localHistory', JSON.stringify(localHistory));
            allUsersData[myUid] = { userName: currentUserName, color: dbUserColor, history: [...localHistory], lastUpdate: Date.now() };
            renderMap(); if (shouldUpload) saveLocationToServer();
        }

        function saveLocationToServer() {
            if (!isSystemReady || localHistory.length === 0 || isSpectatorMode) return;
            ws.send(JSON.stringify({ type: "update_location", uid: myUid, data: { userName: currentUserName, color: dbUserColor, history: localHistory, lastUpdate: Date.now() } }));
        }

        function renderMap() { /* 原本標記與迷霧邏輯 */ }

        function getDistance(lat1, lon1, lat2, lon2) {
            const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180, dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2); return 6371e3 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.addEventListener('DOMContentLoaded', initSystem);
    </script>
</body>
</html>
