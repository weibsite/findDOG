<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社群貼文抓取工具</title>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel (用來在瀏覽器中解析 JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div id="root"></div>

  <!-- React 應用程式區塊 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示組件 ---
    const Download = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    );
    const LinkIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    );
    const ImageIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    );
    const FileText = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
    );
    const CheckCircle2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    );
    const AlertCircle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );
    const Loader2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    );
    const ZoomIn = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></svg>
    );
    const XIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    );
    const ChevronLeft = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"/></svg>
    );
    const ChevronRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>
    );
    const HistoryIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
    );
    const CalendarIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    );
    const ClockIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    );

    // 全域變數儲存 WebSocket 網址
    let NGROK_WS_URL = '';

    const getBaseHttpUrl = () => {
      if (!NGROK_WS_URL) return '';
      let url = NGROK_WS_URL;
      url = url.replace('wss://', 'https://').replace('ws://', 'http://');
      url = url.replace(/\/ws\/?$/, '');
      return url;
    };

    function App() {
      const [url, setUrl] = useState('');
      const [status, setStatus] = useState('idle');
      const [result, setResult] = useState(null);
      const [errorMessage, setErrorMessage] = useState('');
      const [isInitialized, setIsInitialized] = useState(false);
      
      // 新增：檢視模式切換 (scraper | history) 與歷史資料
      const [viewMode, setViewMode] = useState('scraper');
      const [historyData, setHistoryData] = useState([]);
      const [isLoadingHistory, setIsLoadingHistory] = useState(false);

      // Lightbox 狀態控制 (改為通用格式，支援任何圖片陣列)
      const [lightboxData, setLightboxData] = useState({ index: null, images: [] });

      useEffect(() => {
        const initSystem = async () => {
          try {
            const response = await fetch(`config.json?t=${Date.now()}`);
            const data = await response.json();
            if (data.ws_url) {
              NGROK_WS_URL = data.ws_url;
            }
          } catch (error) {
            console.warn('無法讀取 config.json，將使用預設推導規則 (這是正常的，如果是直接部署的話)');
          }

          if (!NGROK_WS_URL) {
            NGROK_WS_URL = window.location.origin.replace('http', 'ws') + '/ws';
          }
          setIsInitialized(true);
        };
        initSystem();
      }, []);

      // 當切換到歷史紀錄時，自動發起請求獲取資料
      useEffect(() => {
        if (isInitialized && viewMode === 'history') {
          fetchHistory();
        }
      }, [isInitialized, viewMode]);

      // 監聽鍵盤事件 (支援 Esc 關閉與左右鍵切換)
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (lightboxData.index === null || lightboxData.images.length === 0) return;
          if (e.key === 'Escape') closeLightbox();
          if (e.key === 'ArrowLeft') showPrev();
          if (e.key === 'ArrowRight') showNext();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [lightboxData]);

      const fetchHistory = async () => {
        setIsLoadingHistory(true);
        try {
          const baseUrl = getBaseHttpUrl();
          const response = await fetch(`${baseUrl}/api/scraped_posts`);
          const data = await response.json();
          if (data.success) {
            setHistoryData(data.data);
          }
        } catch (error) {
          console.error("載入歷史紀錄失敗:", error);
        } finally {
          setIsLoadingHistory(false);
        }
      };

      const detectPlatform = (url) => {
        if (url.includes('threads.net') || url.includes('threads.com')) return 'Threads';
        if (url.includes('instagram.com')) return 'Instagram';
        if (url.includes('facebook.com') || url.includes('fb.watch')) return 'Facebook';
        return '未知平台';
      };

      const handleScrape = async (e) => {
        e.preventDefault();
        if (!url) {
          setErrorMessage('請輸入有效的網址');
          setStatus('error');
          return;
        }

        const platform = detectPlatform(url);
        if (platform === '未知平台') {
          setErrorMessage('目前僅支援 Threads, Instagram, 或 Facebook 的網址');
          setStatus('error');
          return;
        }

        setStatus('loading');
        setResult(null);
        closeLightbox();

        try {
          const baseUrl = getBaseHttpUrl(); 
          const response = await fetch(`${baseUrl}/api/scrape`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
          });
          const data = await response.json();
          
          if(data.success) {
             setStatus('success');
             const formattedImages = data.data.images.map(img => {
               let safeImgPath = img.replace(/\\/g, '/');
               if (safeImgPath.startsWith('http')) return safeImgPath;
               const cleanBaseUrl = baseUrl.replace(/\/$/, '');
               const cleanImgPath = safeImgPath.startsWith('/') ? safeImgPath.substring(1) : safeImgPath;
               return `${cleanBaseUrl}/${cleanImgPath}`;
             });

             setResult({
               platform: platform,
               text: data.data.text,
               post_time: data.data.post_time,
               images: formattedImages,
               originalImages: data.data.original_images || formattedImages,
               savedPath: data.savedPath
             });
          } else {
             setStatus('error');
             setErrorMessage(data.error || '抓取失敗，請確認該貼文是否為公開狀態。');
          }
        } catch (err) {
           console.error("Scrape Error:", err);
           setStatus('error');
           setErrorMessage('無法連線到伺服器。請確認後端伺服器 (server.py) 是否已啟動，以及網址設定是否正確。');
        }
      };

      // Lightbox 操控函數 (支援傳入特定的圖片陣列)
      const openLightbox = (index, imagesArray) => setLightboxData({ index, images: imagesArray });
      const closeLightbox = () => setLightboxData({ index: null, images: [] });
      const showPrev = () => {
        setLightboxData(prev => ({
          ...prev,
          index: prev.index > 0 ? prev.index - 1 : prev.images.length - 1
        }));
      };
      const showNext = () => {
        setLightboxData(prev => ({
          ...prev,
          index: prev.index < prev.images.length - 1 ? prev.index + 1 : 0
        }));
      };

      // 共用的圖片網格渲染組件
      const renderImageGrid = (localImages, originalImages) => {
        const baseUrl = getBaseHttpUrl();
        const cleanBaseUrl = baseUrl.replace(/\/$/, '');
        
        // 確保路徑格式正確 (歷史紀錄的 localImages 可能只有 /downloads/... )
        const displayImages = localImages.map(img => {
            let safeImgPath = img.replace(/\\/g, '/');
            if (safeImgPath.startsWith('http')) return safeImgPath;
            const cleanImgPath = safeImgPath.startsWith('/') ? safeImgPath.substring(1) : safeImgPath;
            return `${cleanBaseUrl}/${cleanImgPath}`;
        });

        return (
          <div className="p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
            {displayImages.map((imgUrl, index) => {
              const originalUrl = (originalImages && originalImages[index]) ? originalImages[index] : imgUrl;
              return (
                <div key={index} className="flex flex-col rounded-xl overflow-hidden border border-gray-200 bg-gray-50">
                  <div 
                    className="group relative cursor-pointer overflow-hidden bg-white"
                    onClick={() => openLightbox(index, displayImages)}
                  >
                    <img 
                      src={imgUrl} 
                      alt={`Scraped image ${index + 1}`} 
                      className="w-full h-auto object-cover aspect-video transition-transform duration-300 group-hover:scale-105" 
                    />
                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                      <span className="text-white text-sm font-medium flex items-center gap-1">
                        <ZoomIn className="w-5 h-5" /> 點擊放大
                      </span>
                    </div>
                  </div>
                  
                  <div className="p-3 border-t border-gray-100 text-xs text-gray-600 bg-white">
                    <a 
                      href={originalUrl} 
                      target="_blank" 
                      rel="noreferrer" 
                      className="inline-flex items-start gap-1.5 hover:text-blue-600 hover:underline break-all"
                      title={originalUrl}
                    >
                      <LinkIcon className="w-4 h-4 flex-shrink-0 mt-0.5" />
                      <span className="line-clamp-2">{originalUrl}</span>
                    </a>
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      if (!isInitialized) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-50">
            <Loader2 className="w-8 h-8 text-blue-600" />
            <span className="ml-2 text-gray-600 font-medium">正在初始化系統...</span>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-8 bg-gray-50">
          <div className="max-w-4xl mx-auto space-y-8">
            
            {/* Header & Tabs */}
            <div className="space-y-6">
              <div className="text-center space-y-2">
                <h1 className="text-3xl md:text-4xl font-bold text-gray-900 flex items-center justify-center gap-3">
                  <Download className="w-8 h-8 text-blue-600" />
                  社群貼文抓取系統
                </h1>
                <p className="text-gray-500">
                  支援擷取 Threads, IG 或 FB 的內文與圖片，並紀錄原始特徵資訊。
                </p>
              </div>

              {/* Tab Navigation */}
              <div className="flex justify-center">
                <div className="inline-flex bg-white rounded-xl p-1 shadow-sm border border-gray-200">
                  <button
                    onClick={() => setViewMode('scraper')}
                    className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium text-sm transition-all ${viewMode === 'scraper' ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-50'}`}
                  >
                    <LinkIcon className="w-4 h-4" /> 新增抓取
                  </button>
                  <button
                    onClick={() => setViewMode('history')}
                    className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium text-sm transition-all ${viewMode === 'history' ? 'bg-blue-600 text-white shadow' : 'text-gray-600 hover:text-gray-900 hover:bg-gray-50'}`}
                  >
                    <HistoryIcon className="w-4 h-4" /> 歷史紀錄
                  </button>
                </div>
              </div>
            </div>

            {/* ================= 模式 1：新增抓取工具 ================= */}
            {viewMode === 'scraper' && (
              <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                {/* Input Section */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                  <form onSubmit={handleScrape} className="space-y-4">
                    <div>
                      <label htmlFor="url-input" className="block text-sm font-medium text-gray-700 mb-1">
                        目標貼文網址
                      </label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                          <LinkIcon className="h-5 w-5 text-gray-400" />
                        </div>
                        <input
                          id="url-input"
                          type="url"
                          placeholder="https://www.threads.net/..."
                          value={url}
                          onChange={(e) => { setUrl(e.target.value); setStatus('idle'); }}
                          className="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-gray-50 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                          required
                        />
                      </div>
                      {url && detectPlatform(url) !== '未知平台' && (
                        <p className="mt-2 text-sm text-blue-600 flex items-center gap-1">
                          <CheckCircle2 className="w-4 h-4" /> 已識別平台：{detectPlatform(url)}
                        </p>
                      )}
                    </div>

                    <button
                      type="submit"
                      disabled={status === 'loading'}
                      className="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-blue-400 disabled:cursor-not-allowed transition-colors"
                    >
                      {status === 'loading' ? (
                        <React.Fragment>
                          <Loader2 className="mr-2 h-5 w-5" />
                          正在啟動無頭瀏覽器抓取中...
                        </React.Fragment>
                      ) : (
                        '開始抓取並儲存'
                      )}
                    </button>
                  </form>
                </div>

                {status === 'error' && (
                  <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-xl flex items-start gap-3">
                    <AlertCircle className="w-5 h-5 text-red-500 mt-0.5 shrink-0" />
                    <div>
                      <h3 className="text-red-800 font-medium">抓取失敗</h3>
                      <p className="text-red-700 text-sm mt-1">{errorMessage}</p>
                    </div>
                  </div>
                )}

                {status === 'success' && result && (
                  <div className="space-y-6">
                    <div className="bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-xl flex items-center gap-3">
                      <CheckCircle2 className="w-5 h-5 text-green-600 shrink-0" />
                      <p>成功擷取並寫入資料庫！檔案已儲存至：<code className="bg-white px-2 py-1 rounded border text-xs">{result.savedPath}</code></p>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                      <div className="border-b border-gray-100 bg-gray-50 px-6 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <FileText className="w-5 h-5 text-gray-500" />
                          <h3 className="font-semibold text-gray-800">擷取到的文字</h3>
                        </div>
                        {result.post_time && (
                          <div className="flex items-center gap-1.5 text-xs text-gray-500 bg-white px-2 py-1 rounded-md border border-gray-200">
                            <CalendarIcon className="w-3.5 h-3.5" />
                            {result.post_time}
                          </div>
                        )}
                      </div>
                      <div className="p-6">
                        <p className="text-gray-700 whitespace-pre-wrap leading-relaxed">
                          {result.text}
                        </p>
                      </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                      <div className="border-b border-gray-100 bg-gray-50 px-6 py-4 flex items-center gap-2">
                        <ImageIcon className="w-5 h-5 text-gray-500" />
                        <h3 className="font-semibold text-gray-800">擷取到的圖片 ({result.images.length})</h3>
                      </div>
                      {renderImageGrid(result.images, result.originalImages)}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ================= 模式 2：歷史紀錄瀏覽 ================= */}
            {viewMode === 'history' && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="flex items-center justify-between">
                  <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <HistoryIcon className="w-6 h-6 text-blue-600" /> 資料庫抓取紀錄
                  </h2>
                  <button 
                    onClick={fetchHistory}
                    disabled={isLoadingHistory}
                    className="text-sm flex items-center gap-1.5 text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition-colors"
                  >
                    <Loader2 className={`w-4 h-4 ${isLoadingHistory ? 'animate-spin' : 'hidden'}`} />
                    重新整理
                  </button>
                </div>

                {isLoadingHistory && historyData.length === 0 ? (
                  <div className="py-12 flex flex-col items-center justify-center text-gray-500">
                    <Loader2 className="w-8 h-8 text-blue-500 animate-spin mb-3" />
                    載入歷史資料中...
                  </div>
                ) : historyData.length === 0 ? (
                  <div className="bg-white p-10 text-center rounded-2xl border border-gray-200 text-gray-500">
                    目前資料庫中沒有任何抓取紀錄。
                  </div>
                ) : (
                  <div className="space-y-8">
                    {historyData.map((record) => (
                      <div key={record.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        {/* Record Header */}
                        <div className="bg-gray-50/80 px-6 py-4 border-b border-gray-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                          <div className="flex-1 min-w-0">
                            <a href={record.url} target="_blank" rel="noreferrer" className="text-sm font-semibold text-blue-600 hover:underline flex items-center gap-2 truncate">
                              <LinkIcon className="w-4 h-4 flex-shrink-0" />
                              <span className="truncate">{record.url}</span>
                            </a>
                          </div>
                          <div className="flex flex-col sm:items-end gap-1 text-xs text-gray-500 flex-shrink-0">
                            {record.post_time && (
                              <span className="flex items-center gap-1.5 bg-white px-2 py-0.5 rounded border border-gray-200">
                                <CalendarIcon className="w-3.5 h-3.5" /> 貼文時間: {record.post_time}
                              </span>
                            )}
                            <span className="flex items-center gap-1.5 bg-white px-2 py-0.5 rounded border border-gray-200">
                              <ClockIcon className="w-3.5 h-3.5" /> 抓取時間: {record.create_time}
                            </span>
                          </div>
                        </div>
                        
                        {/* Record Text */}
                        <div className="px-6 py-5 border-b border-gray-100">
                          <p className="text-gray-700 whitespace-pre-wrap text-sm leading-relaxed max-h-40 overflow-y-auto custom-scrollbar">
                            {record.text || <span className="text-gray-400 italic">無文字內容</span>}
                          </p>
                        </div>
                        
                        {/* Record Images */}
                        {record.images && record.images.length > 0 && (
                           renderImageGrid(record.images, record.original_images)
                        )}
                        {(!record.images || record.images.length === 0) && (
                           <div className="px-6 py-4 text-sm text-gray-400 italic">無圖片</div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
            
            {/* ================= 全域全螢幕圖片預覽 (Lightbox) ================= */}
            {lightboxData.index !== null && lightboxData.images && (
              <div 
                className="fixed inset-0 z-[100] flex items-center justify-center bg-black/95 backdrop-blur-sm"
                onClick={closeLightbox}
              >
                {/* 關閉按鈕 */}
                <button 
                  className="absolute top-4 right-4 text-white/70 hover:text-white p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors z-50"
                  onClick={(e) => { e.stopPropagation(); closeLightbox(); }}
                >
                  <XIcon className="w-8 h-8" />
                </button>
                
                {/* 圖片數量 > 1 時顯示左右按鈕 */}
                {lightboxData.images.length > 1 && (
                  <React.Fragment>
                    <button 
                      className="absolute left-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white p-3 bg-white/5 hover:bg-white/20 rounded-full transition-colors z-50"
                      onClick={(e) => { e.stopPropagation(); showPrev(); }}
                    >
                      <ChevronLeft className="w-10 h-10" />
                    </button>
                    <button 
                      className="absolute right-4 top-1/2 -translate-y-1/2 text-white/70 hover:text-white p-3 bg-white/5 hover:bg-white/20 rounded-full transition-colors z-50"
                      onClick={(e) => { e.stopPropagation(); showNext(); }}
                    >
                      <ChevronRight className="w-10 h-10" />
                    </button>
                  </React.Fragment>
                )}

                {/* 當前預覽圖片 */}
                <img 
                  src={lightboxData.images[lightboxData.index]} 
                  alt="Fullscreen view" 
                  className="max-w-[90vw] max-h-[90vh] object-contain select-none shadow-2xl rounded-sm"
                  onClick={(e) => e.stopPropagation()} 
                />

                {/* 頁碼指示器 */}
                <div className="absolute bottom-8 left-1/2 -translate-x-1/2 text-white bg-black/60 px-5 py-2 rounded-full text-sm font-medium tracking-widest pointer-events-none border border-white/10">
                  {lightboxData.index + 1} / {lightboxData.images.length}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    /* 客製化滾動條，讓歷史紀錄的文字區塊更美觀 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: #94a3b8;
    }
  </style>
</body>
</html>
