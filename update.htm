<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上傳大型檔案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .pixel-panel { border: 4px solid #1a202c; box-shadow: 6px 6px 0px #1a202c; border-radius: 8px; }
        .pixel-btn { border: 3px solid #1a202c; box-shadow: 4px 4px 0px #1a202c; transition: all 0.1s; font-weight: 900; border-radius: 6px; }
        .pixel-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #1a202c; }
        .pixel-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: translate(4px, 4px); }
        .pixel-input { border: 3px solid #1a202c; box-shadow: inset 3px 3px 0px rgba(0,0,0,0.1); outline: none; border-radius: 6px; }
        .pixel-input:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="pixel-panel p-8 w-full max-w-md bg-white text-center">
        <h2 class="text-3xl font-black text-gray-900 mb-8 border-b-4 border-gray-900 pb-4 inline-block">📂 上傳大型檔案</h2>
        <div class="mb-5 text-left">
            <label class="block text-base font-black mb-2 text-gray-800">🔑 設定觀看密碼 (自訂)</label>
            <input type="text" id="upload-password" class="pixel-input w-full p-4 text-lg font-bold" placeholder="請設定一個密碼，觀看者需輸入此密碼才能播放">
        </div>
        <div class="mb-8 text-left">
            <label class="block text-base font-black mb-2 text-gray-800">📄 選擇要上傳的檔案 (支援大型影片)</label>
            <input type="file" id="upload-file" class="pixel-input w-full p-3 text-base bg-gray-50 font-bold cursor-pointer">
        </div>
        
        <div id="progress-container" class="mb-6 hidden">
            <div class="text-left font-bold text-sm text-gray-700 mb-1 flex justify-between">
                <span>上傳進度</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 border-2 border-black h-6 rounded overflow-hidden relative">
                <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>
            <div id="retry-status" class="text-xs text-orange-600 font-bold mt-2 hidden text-left"></div>
        </div>

        <button id="upload-btn" class="pixel-btn w-full py-4 bg-blue-600 hover:bg-blue-500 text-white text-xl tracking-wider">🚀 開始上傳</button>
        <div id="upload-status" class="mt-6 font-bold hidden whitespace-pre-wrap text-base p-3 border-2 border-dashed border-gray-400 rounded bg-gray-50 text-left leading-relaxed"></div>
    </div>
    <script>
        const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB per chunk
        let API_BASE_URL = "";

        async function loadConfig() {
            try {
                const res = await fetch('config.json?t=' + Date.now());
                const data = await res.json();
                if (data && data.ws_url) {
                    API_BASE_URL = data.ws_url.replace('wss://', 'https://').replace('ws://', 'http://').replace(/\/ws\/?$/, '');
                }
            } catch (e) {
                console.warn("載入 config.json 失敗", e);
                API_BASE_URL = location.origin;
            }
        }
        loadConfig();

        document.getElementById('upload-btn').addEventListener('click', async () => {
            const pwd = document.getElementById('upload-password').value;
            const fileInput = document.getElementById('upload-file');
            const statusEl = document.getElementById('upload-status');
            const btn = document.getElementById('upload-btn');
            const progContainer = document.getElementById('progress-container');
            const progBar = document.getElementById('progress-bar');
            const progText = document.getElementById('progress-text');
            const retryStatus = document.getElementById('retry-status');
            
            if (!pwd) {
                statusEl.innerHTML = '❌ <span class="text-red-600">請輸入密碼！</span>';
                statusEl.classList.remove('hidden');
                return;
            }
            if (!fileInput.files.length) {
                statusEl.innerHTML = '❌ <span class="text-red-600">請選擇檔案！</span>';
                statusEl.classList.remove('hidden');
                return;
            }

            if (!API_BASE_URL) await loadConfig();
            const fetchUrl = API_BASE_URL + '/api/upload_chunk';

            const file = fileInput.files[0];
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            const uploadId = Date.now() + "_" + Math.floor(Math.random() * 1000);

            statusEl.classList.add('hidden');
            progContainer.classList.remove('hidden');
            retryStatus.classList.add('hidden');
            btn.disabled = true;
            btn.innerText = '⏳ 上傳中...';
            progBar.style.width = '0%';
            progText.innerText = '0%';

            for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex++) {
                const start = chunkIndex * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const chunk = file.slice(start, end);

                const formData = new FormData();
                formData.append('password', pwd);
                formData.append('chunk_index', chunkIndex);
                formData.append('total_chunks', totalChunks);
                formData.append('filename', file.name);
                formData.append('upload_id', uploadId);
                formData.append('file', chunk, file.name);

                let retries = 5;
                let success = false;
                let responseData = null;

                while (retries > 0 && !success) {
                    try {
                        const res = await fetch(fetchUrl, {
                            method: 'POST',
                            body: formData
                        });
                        
                        responseData = await res.json();
                        if (responseData.success) {
                            success = true;
                            retryStatus.classList.add('hidden');
                        } else {
                            throw new Error(responseData.message || "伺服器拒絕上傳");
                        }
                    } catch (err) {
                        retries--;
                        if (retries > 0) {
                            retryStatus.innerText = `⚠️ 網路連線異常，正在重試區塊 ${chunkIndex + 1}/${totalChunks} (剩餘 ${retries} 次重試機會)...`;
                            retryStatus.classList.remove('hidden');
                            await new Promise(r => setTimeout(r, 3000)); // wait 3s before retry
                        } else {
                            statusEl.innerHTML = `❌ <span class="text-red-600">區塊 ${chunkIndex + 1} 上傳失敗，網路嚴重不穩，請重新嘗試。</span>`;
                            statusEl.classList.remove('hidden');
                            btn.disabled = false;
                            btn.innerText = '🚀 開始上傳';
                            return;
                        }
                    }
                }

                // Update progress
                const percent = Math.round(((chunkIndex + 1) / totalChunks) * 100);
                progBar.style.width = percent + '%';
                progText.innerText = percent + '%';

                if (chunkIndex === totalChunks - 1) {
                    // Completed
                    const fullUrl = location.origin + responseData.url;
                    statusEl.innerHTML = '✅ <span class="text-green-600">上傳成功！</span><br><br>檔案連結 (點擊複製)：<br><div id="copy-link" class="text-blue-600 underline break-all cursor-pointer bg-blue-100 p-2 rounded inline-block mt-2 font-black border-2 border-blue-200">' + fullUrl + '</div>';
                    statusEl.classList.remove('hidden');
                    
                    document.getElementById('copy-link').addEventListener('click', () => {
                        navigator.clipboard.writeText(fullUrl);
                        const el = document.getElementById('copy-link');
                        el.innerHTML = '✅ <span class="text-green-600">網址已成功複製！</span>';
                        setTimeout(() => { el.innerHTML = fullUrl; }, 2000);
                    });

                    fileInput.value = '';
                    btn.disabled = false;
                    btn.innerText = '🚀 開始上傳';
                }
            }
        });
    </script>
    <div class="fixed bottom-2 right-2 z-50 p-2 text-xs sm:text-sm font-bold bg-white/90 backdrop-blur border-2 border-gray-800 rounded flex gap-3 items-center shadow-[2px_2px_0px_#1a202c]">
        <a href="index.htm" class="text-orange-600 hover:text-orange-800 font-black">尋寵地圖</a>
        <a href="runrun.htm" class="text-purple-600 hover:text-purple-800 font-black">浪浪地圖</a>
        <a href="govpet.htm" class="text-blue-600 hover:text-blue-800 font-black">走失協尋</a>
        <a href="https://line.me/ti/p/gDtots7NXX" target="_blank" class="text-green-600 hover:text-green-800 font-black">聯絡作者</a>
    </div>
</body>
</html>
